name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Define as permissões estritas do GITHUB_TOKEN para deploy seguro
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo para evitar conflitos de publicação
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código Fonte
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências de Forma Segura (npm ci)
        run: npm ci

      - name: Compilar Projeto (Vite Build)
        run: npm run build

      - name: Upload de Artefato do Build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
